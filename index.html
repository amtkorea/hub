<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f6feb">
<title>AMT 통합 허브</title>

<!-- PWA 설치용 manifest (정식 파일로 분리) -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AMT허브">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: #f5f6f8;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* 상단 탭바 */
  #tabbar {
    flex: 0 0 auto;
    display: flex;
    background: #ffffff;
    border-bottom: 1px solid #e1e4e8;
    padding-top: env(safe-area-inset-top);
  }
  .tab {
    flex: 1 1 0;
    border: none;
    background: transparent;
    padding: 13px 6px 11px;
    font-size: 14px;
    font-weight: 500;
    color: #57606a;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color .15s, border-color .15s;
  }
  .tab .ico { font-size: 19px; line-height: 1; }
  .tab.active {
    color: #1f6feb;
    border-bottom-color: #1f6feb;
  }
  .tab:active { background: #f0f2f5; }

  /* 본문 프레임 영역 */
  #frames {
    flex: 1 1 auto;
    position: relative;
    background: #f5f6f8;
  }
  .frame-wrap {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
  }
  .frame-wrap.active { display: flex; }

  /* 각 앱 상단의 작은 도구막대 (새 창 열기 / 새로고침) */
  .frame-tools {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: #fafbfc;
    border-bottom: 1px solid #eaecef;
    font-size: 12px;
    color: #6e7781;
  }
  .frame-tools .name { font-weight: 600; color: #24292f; }
  .frame-tools .spacer { flex: 1; }
  .frame-tools button {
    border: 1px solid #d0d7de;
    background: #fff;
    border-radius: 6px;
    padding: 4px 9px;
    font-size: 12px;
    color: #24292f;
    cursor: pointer;
  }
  .frame-tools button:active { background: #f3f4f6; }

  iframe {
    flex: 1 1 auto;
    width: 100%;
    border: none;
    background: #fff;
  }

  /* 로딩 표시 */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: #6e7781;
    font-size: 14px;
    background: #f5f6f8;
    pointer-events: none;
  }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid #d0d7de;
    border-top-color: #1f6feb;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading.hidden { display: none; }

  /* === 핸드폰 화면 최적화 (가로 700px 이하) === */
  @media (max-width: 700px) {
    /* 탭바를 화면 아래로 내림 → 위 공간은 앱이 전부 차지 */
    #frames {
      order: 0;
      background: #1f6feb; /* 상단 안전여백 띠를 상태바와 같은 파란색으로 */
    }
    #tabbar {
      order: 2;
      border-bottom: none;
      border-top: 1px solid #e1e4e8;
      padding-top: 0;
      padding-bottom: max(env(safe-area-inset-bottom), 6px); /* 홈 버튼 영역 회피 */
      box-shadow: 0 -1px 5px rgba(0,0,0,0.05);
    }
    /* 탭 버튼 작게 (세로 공간 절약) */
    .tab {
      padding: 7px 4px;
      font-size: 12px;
      gap: 2px;
    }
    .tab .ico { font-size: 21px; }

    /* 앱 화면 상단을 상태바 아래로 확실히 내려 안 가리게
       (env 값이 0으로 나오는 폰 대비: 최소 36px 강제) */
    .frame-wrap { top: max(env(safe-area-inset-top), 36px); }
    .loading { top: max(env(safe-area-inset-top), 36px); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- 상단 탭 3개 -->
  <div id="tabbar">
    <button class="tab active" data-tab="amt" onclick="showTab('amt')">
      <span class="ico">📦</span>AMT 주문
    </button>
    <button class="tab" data-tab="gmp" onclick="showTab('gmp')">
      <span class="ico">🧪</span>AMT-GMP
    </button>
    <button class="tab" data-tab="ky" onclick="showTab('ky')">
      <span class="ico">📋</span>KY 재고
    </button>
  </div>

  <!-- 본문: 앱 3개를 담는 프레임 -->
  <div id="frames">

    <!-- AMT 주문 -->
    <div class="frame-wrap active" id="wrap-amt">
      <div class="loading" id="load-amt"><div class="spinner"></div>불러오는 중…</div>
    </div>

    <!-- AMT-GMP -->
    <div class="frame-wrap" id="wrap-gmp">
      <div class="loading hidden" id="load-gmp"><div class="spinner"></div>불러오는 중…</div>
    </div>

    <!-- KY 재고 -->
    <div class="frame-wrap" id="wrap-ky">
      <div class="loading hidden" id="load-ky"><div class="spinner"></div>불러오는 중…</div>
    </div>

  </div>
</div>

<script>
  // 각 앱의 주소 (앱을 업데이트하면 이 주소의 최신 버전이 자동으로 들어옵니다)
  var APPS = {
    amt: "https://amedtech-creator.github.io/AMT/index-AMT.html",
    gmp: "https://amtkorea.github.io/AMT-GMP/gmp-AMT.html",
    ky:  "https://amtkorea.github.io/inventory/audit-KY.html"
  };

  // 카메라/마이크/전체화면 권한 (GMP 바코드 스캔에 필요)
  var ALLOW = "camera; microphone; fullscreen; clipboard-read; clipboard-write";

  var loaded = {}; // 이미 불러온 탭 기록 (한 번 누른 탭만 로딩 → 폰 부담 줄임)

  // iframe을 실제로 만들어 넣는 함수
  function ensureFrame(key) {
    if (loaded[key]) return;
    loaded[key] = true;

    var wrap = document.getElementById("wrap-" + key);
    var load = document.getElementById("load-" + key);

    var ifr = document.createElement("iframe");
    ifr.id = "frame-" + key;
    ifr.src = APPS[key];
    ifr.setAttribute("allow", ALLOW);
    ifr.setAttribute("allowfullscreen", "true");
    ifr.addEventListener("load", function () {
      if (load) load.classList.add("hidden");
    });
    wrap.appendChild(ifr);

    // 혹시 5초 안에 안 뜨면 로딩 표시만 치움 (X-Frame 차단 대비)
    setTimeout(function () {
      if (load) load.classList.add("hidden");
    }, 5000);
  }

  // 탭 전환
  function showTab(key) {
    var tabs = document.querySelectorAll(".tab");
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle("active", tabs[i].getAttribute("data-tab") === key);
    }
    var wraps = document.querySelectorAll(".frame-wrap");
    for (var j = 0; j < wraps.length; j++) {
      wraps[j].classList.toggle("active", wraps[j].id === "wrap-" + key);
    }
    ensureFrame(key);
  }

  // 해당 앱 새로고침
  function reloadFrame(key) {
    var ifr = document.getElementById("frame-" + key);
    var load = document.getElementById("load-" + key);
    if (ifr) {
      if (load) load.classList.remove("hidden");
      ifr.src = APPS[key]; // 다시 로드
    } else {
      ensureFrame(key);
    }
  }

  // 앱을 별도 창(탭)으로 열기 — iframe 안에서 카메라 등이 막힐 때 대안
  function openExternal(key) {
    window.open(APPS[key], "_blank", "noopener");
  }

  // 첫 화면: AMT 탭 자동 로드
  ensureFrame("amt");

  // 서비스워커 등록 (앱 설치 + 오프라인 지원)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw-hub.js?v=20260620v5').catch(function () {});
    });
  }
</script>
</body>
</html>
